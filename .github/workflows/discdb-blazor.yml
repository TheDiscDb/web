name: Build and deploy Blazor app
on:
  workflow_dispatch:
env:
  AZURE_WEBAPP_NAME: thediscdb
  DOTNET_CORE_VERSION: 10.0.x
permissions:
  id-token: write
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: ${{ env.DOTNET_CORE_VERSION }}
    - name: Restore
      run: dotnet restore "code/TheDiscDb/TheDiscDb.csproj"
    - name: Build
      run: dotnet build "code/TheDiscDb/TheDiscDb.csproj" --configuration Release --no-restore
    - name: Test
      run: dotnet test --project "code/TheDiscDb.UnitTests/TheDiscDb.UnitTests.csproj" --configuration Release
    - name: Publish
      run: dotnet publish "code/TheDiscDb/TheDiscDb.csproj" --configuration Release --no-build --output publish
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: webapp
        path: publish
  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
    - name: Download artifact
      uses: actions/download-artifact@v4
      with:
        name: webapp
        path: publish
    - name: Log in to Azure
      uses: azure/login@v2
      with:
        client-id: ${{ vars.AZURE_CLIENT_ID }}
        tenant-id: ${{ vars.AZURE_TENANT_ID }}
        subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
    - name: Deploy to Azure WebApp
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        package: publish
