schema {
  query: Query
}

type Boxset {
  id: Int!
  title: String
  sortTitle: String
  slug: String
  imageUrl: String
  release: Release
  releaseId: Int!
  type: String!
}

"A connection to a list of items."
type BoxsetsConnection {
  "Information to aid in pagination."
  pageInfo: PageInfo!
  "A list of edges."
  edges: [BoxsetsEdge!]
  "A flattened list of the nodes."
  nodes: [Boxset!]
}

"An edge in a connection."
type BoxsetsEdge {
  "A cursor for use in pagination."
  cursor: String!
  "The item at the end of the edge."
  node: Boxset!
}

type Chapter {
  id: Int!
