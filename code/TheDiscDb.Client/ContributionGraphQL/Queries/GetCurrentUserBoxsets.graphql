query GetCurrentUserBoxsets($where: UserContributionBoxsetFilterInput, $first: Int, $after: String) {
  myBoxsets(where: $where, first: $first, after: $after) {
    nodes {
      encodedId
      title
      slug
      status
      created
    }
    pageInfo {
      hasNextPage
      hasPreviousPage
      startCursor
      endCursor
    }
    totalCount
  }
}
