query GetBoxsetDetail($where: UserContributionBoxsetFilterInput) {
  myBoxsets(where: $where, first: 1) {
    nodes {
      encodedId
      title
      sortTitle
      slug
      status
      frontImageUrl
      backImageUrl
      asin
      upc
      releaseDate
      locale
      regionCode
      created
      members(order: { sortOrder: ASC }) {
        sortOrder
        disc {
          encodedId
          name
          format
          slug
        }
      }
    }
  }
}
