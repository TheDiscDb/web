mutation AddExistingDiscToBoxset($input: AddExistingDiscToBoxsetInput!) {
  addExistingDiscToBoxset(input: $input) {
    userContributionBoxset {
      encodedId
      members {
        id
        sortOrder
        existingDiscPath
        existingDiscName
        existingDiscFormat
        disc {
          encodedId
          name
          format
          slug
        }
      }
    }
    errors {
      code: __typename
      ... on Error {
        message
      }
    }
  }
}
